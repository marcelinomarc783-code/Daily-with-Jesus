<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>القطمارس - مكتبة الآيات</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', serif;
            background: #0d1b2a; /* الخلفية الداكنة الأصلية */
            color: white;
            min-height: 100vh;
        }

        /* الهيدر العلوي كما في الصور */
        .top-nav {
            background: #1b263b;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .app-title { font-size: 1.3rem; font-weight: bold; }

        .date-display {
            padding: 20px;
            text-align: right;
            background: rgba(27, 38, 59, 0.8);
        }
        .coptic-text { color: #c9a03d; font-size: 1.4rem; font-weight: bold; margin-top: 5px; }
        .sub-text { color: #8d99ae; font-size: 0.9rem; }

        /* أزرار التبديل */
        .toggle-container {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .btn-toggle {
            padding: 8px 25px;
            border-radius: 8px;
            border: 1px solid #1d3557;
            background: #1d3557;
            color: white;
            cursor: pointer;
            font-family: 'Amiri';
        }
        .btn-toggle.active { background: #000080; border-color: #457b9d; }

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }

        /* التبويبات */
        .tabs {
            display: flex; background: #1b263b; border-radius: 15px;
            padding: 5px; margin-bottom: 20px; border: 1px solid #c9a03d;
        }
        .tab {
            flex: 1; text-align: center; padding: 10px; cursor: pointer;
            border-radius: 10px; transition: 0.3s;
        }
        .tab.active { background: #c9a03d; color: #0d1b2a; font-weight: bold; }

        /* محتوى القراءات */
        .content-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 20px;
            min-height: 400px;
            border: 1px solid rgba(201, 160, 61, 0.2);
        }

        .reading-block { margin-bottom: 25px; }
        .reading-header { color: #c9a03d; font-size: 1.2rem; font-weight: bold; margin-bottom: 10px; display: block;}
        .reading-ref { color: #e63946; font-size: 1rem; margin-bottom: 8px; display: block; }
        .reading-body { font-size: 1.15rem; line-height: 1.8; color: #edf2f4; text-align: justify; }

        .footer-icon { text-align: center; margin-top: 30px; opacity: 0.3; }
    </style>
</head>
<body>

<div class="top-nav">
    <div style="font-size: 24px;">☰</div>
    <div class="app-title">القطمارس</div>
    <div style="width: 24px;"></div>
</div>

<div class="date-display">
    <div id="seasonName" class="sub-text">الخمسين المقدسة</div>
    <div id="gregorianDate">الثلاثاء 28 أبريل 2026</div>
    <div id="copticDate" class="coptic-text">20 برمودة 1742</div>
    <div class="toggle-container">
        <button class="btn-toggle active">قبطى</button>
        <button class="btn-toggle">ميلادى</button>
    </div>
</div>

<div class="container">
    <div class="tabs">
        <div class="tab active" data-tab="katamaros">القطمارس</div>
        <div class="tab" data-tab="verses">آيات</div>
    </div>

    <div id="katamaros" class="content-area">
        <div id="readingsContent">جاري تحميل القراءات...</div>
    </div>

    <div id="verses" class="content-area" style="display:none;">
        <div id="verseBox" style="text-align: center; padding-top: 50px;">
            <p id="vText" style="font-size: 1.5rem; color: #c9a03d; line-height: 1.6;"></p>
            <p id="vRef" style="margin-top: 20px; color: #8d99ae;"></p>
            <button onclick="getRandomVerse()" style="margin-top:30px; background:#c9a03d; border:none; padding:10px 20px; border-radius:10px; cursor:pointer;">آية أخرى</button>
        </div>
    </div>

    <div class="footer-icon">✝</div>
</div>

<script>
    // بيانات القطمارس مرتبطة بالتاريخ القبطي (يوم-شهر)
    const katamarosData = {
        "20-8": { // 20 برمودة
            readings: [
                { title: "مقدمة انجيل عشية", text: "قفوا بخوف أمام الله وانصتوا لسماع الإنجيل المقدس. فصل من بشارة معلمنا مار متى البشير والتلميذ الطاهر بركاته على جميعنا." },
                { title: "مزمور عشية", ref: "(6 : 56)", text: "هيأوا لرجلي فخاخاً، وأحنوا نفسي. حفروا قدامي حفرة، وسقطوا فيها. هلليلويا." },
                { title: "انجيل عشية", ref: "(18 : 6 - 7)", text: "مبارك الآتي باسم الرب، ربنا وإلهنا ومخلصنا وملكنا كلنا يسوع المسيح ابن الله الحي الذي له المجد الدائم إلى الأبد آمين. ومن أعثر أحد هؤلاء الصغار المؤمنين بي، فخير له أن يعلق في عنقه حجر رحى ويغرق في البحر..." }
            ]
        },
        "21-8": { // 21 برمودة (مثال لليوم التالي)
            readings: [
                { title: "مزمور عشية", ref: "(2 : 11)", text: "اعبدوا الرب بخشية، واهتفوا له برعدة. هلليلويا." },
                { title: "انجيل عشية", ref: "(12 : 1 - 5)", text: "وفي ذلك الزمان بدأ يسوع يكلمهم..." }
            ]
        }
    };

    function updateLogic() {
        const now = new Date();
        const hour = now.getHours();
        
        // تطبيق قاعدة الساعة 5 مساءً
        if (hour >= 17) {
            now.setDate(now.getDate() + 1);
        }

        // حساب التاريخ القبطي (برمودة هو الشهر الثامن)
        const cDay = (now.getDate() % 30) || 30; // تبسيط للحساب
        const cMonthIdx = 8; 
        const cMonthName = "برمودة";

        document.getElementById('copticDate').innerText = `${cDay} ${cMonthName} 1742`;
        document.getElementById('gregorianDate').innerText = now.toLocaleDateString('ar-EG', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

        // جلب القراءات
        const key = `${cDay}-${cMonthIdx}`;
        const data = katamarosData[key] || katamarosData["20-8"];
        
        const container = document.getElementById('readingsContent');
        container.innerHTML = data.readings.map(r => `
            <div class="reading-block">
                <span class="reading-header">${r.title}</span>
                ${r.ref ? `<span class="reading-ref">${r.ref}</span>` : ''}
                <p class="reading-body">${r.text}</p>
            </div>
        `).join('');
    }

    // نظام الآيات العشوائية
    const backupVerses = [
        {t: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.", r: "إشعياء 41:10"},
        {t: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", r: "فيلبي 4:13"},
        {t: "اَلرَّبُّ نُورِي وَخَلاَصِي، مِمَّنْ أَخَافُ؟", r: "مزمور 27:1"}
    ];

    function getRandomVerse() {
        const v = backupVerses[Math.floor(Math.random() * backupVerses.length)];
        document.getElementById('vText').innerText = `"${v.t}"`;
        document.getElementById('vRef').innerText = v.r;
    }

    // التحكم في التبويبات
    document.querySelectorAll('.tab').forEach(t => {
        t.onclick = () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            const target = t.dataset.tab;
            document.getElementById('katamaros').style.display = target === 'katamaros' ? 'block' : 'none';
            document.getElementById('verses').style.display = target === 'verses' ? 'block' : 'none';
            if(target === 'verses') getRandomVerse();
        };
    });

    window.onload = updateLogic;
</script>
</body>
</html>
