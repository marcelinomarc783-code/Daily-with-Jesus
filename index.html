<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات - كتابك المقدس</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: "✝"; position: fixed; font-size: 350px; opacity: 0.03;
            bottom: -80px; left: -80px; pointer-events: none; color: #c9a03d;
        }
        .container { max-width: 650px; margin: 0 auto; }
        .header {
            text-align: center; padding: 30px 20px; background: white;
            border-radius: 60px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .cross-icon {
            font-size: 50px; color: #c9a03d; margin-bottom: 10px;
            display: inline-block; animation: gentleGlow 2s ease-in-out infinite;
        }
        @keyframes gentleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(201, 160, 61, 0.3); }
            50% { text-shadow: 0 0 15px rgba(201, 160, 61, 0.5); }
        }
        .header h1 { font-size: 2rem; color: #2c3e50; }
        .header h1 span { color: #c9a03d; }
        .tabs {
            display: flex; background: white; border-radius: 60px;
            padding: 5px; margin-bottom: 25px; border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .tab {
            flex: 1; text-align: center; padding: 12px; color: #7f8c8d;
            cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s;
            font-size: 0.85rem;
        }
        .tab.active { background: linear-gradient(135deg, #c9a03d, #b8860b); color: white; }
        .content {
            display: none; background: white; border-radius: 35px;
            padding: 30px; min-height: 400px; animation: fadeIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(201, 160, 61, 0.15);
        }
        .content.active-content { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .verse-card {
            background: #fefefe; border-radius: 25px; padding: 25px;
            margin-bottom: 20px; border-right: 5px solid #c9a03d;
        }
        .verse-text { font-size: 1.5rem; color: #2c3e50; line-height: 1.8; margin-bottom: 15px; }
        .verse-ref { color: #c9a03d; font-size: 1rem; font-weight: bold; }
        .btn {
            background: #2c3e50; color: white; border: none; padding: 10px 22px;
            border-radius: 50px; cursor: pointer; font-family: 'Amiri'; margin: 5px; transition: 0.3s;
        }
        .btn-gold { background: #c9a03d; }
        .katamaros-item {
            padding: 15px; border-bottom: 1px solid #eee;
        }
        .katamaros-title { color: #c9a03d; font-weight: bold; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
        <p>آيات من الكتاب المقدس والقطمارس اليومي</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="katamaros">⛪ قطمارس</div>
        <div class="tab" data-tab="coptic">📅 تقويم قبطي</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div class="verse-text" id="verseText">جاري التحميل...</div>
            <div class="verse-ref" id="verseRef"></div>
            <div class="actions">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ للمفضلة</button>
                <button class="btn" onclick="shareCurrentVerse()">📤 مشاركة</button>
            </div>
        </div>
        <div id="favVersesList" class="favorites-section"></div>
    </div>

    <div id="katamaros" class="content">
        <h2 style="color:#2c3e50; margin-bottom:15px; border-bottom:2px solid #c9a03d; display:inline-block;">قراءات اليوم</h2>
        <div id="katamarosContent"></div>
    </div>

    <div id="coptic" class="content">
        <div id="copticInfo" class="coptic-info"></div>
    </div>
</div>

<script>
    let currentVerse = { text: "", ref: "" };

    // وظيفة تحميل الآيات مع معالجة الأخطاء
    async function loadNewVerse() {
        const vt = document.getElementById('verseText');
        const vr = document.getElementById('verseRef');
        vt.innerText = "جاري التحميل...";
        
        try {
            // محاولة أولى من Bolls Life
            const b = Math.floor(Math.random() * 66) + 1;
            const c = Math.floor(Math.random() * 15) + 1;
            const v = Math.floor(Math.random() * 10) + 1;
            const res = await fetch(`https://bolls.life/get-verse/SVD/${b}/${c}/${v}/`);
            const data = await res.json();
            currentVerse = { text: data.text.replace(/^\d+\s*/, '').trim(), ref: `${data.book_name} ${data.chapter}:${data.verse}` };
        } catch(e) {
            // محاولة ثانية لو فشل الأول
            try {
                const res2 = await fetch('https://api.al-kalema.com/v1/verse/random');
                const data2 = await res2.json();
                currentVerse = { text: data2.text.trim(), ref: `${data2.book_name} ${data2.chapter}:${data2.verse}` };
            } catch(e2) {
                currentVerse = { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.", ref: "إشعياء 41:10" };
            }
        }
        vt.innerText = `"${currentVerse.text}"`;
        vr.innerText = currentVerse.ref;
    }

    // وظيفة القطمارس (شواهد فقط + قلب الساعة 5 مساءً)
    function loadKatamaros() {
        const container = document.getElementById('katamarosContent');
        const now = new Date();
        const hour = now.getHours();
        
        if (hour >= 17) { now.setDate(now.getDate() + 1); }
        
        const title = hour >= 17 ? "قراءات غداً (مبكر)" : "قراءات اليوم";
        
        const readings = [
            { t: "البولس", r: "رومية 8 : 28 - 39" },
            { t: "الكاثوليكون", r: "1 يوحنا 2 : 1 - 6" },
            { t: "الإبركسيس", r: "أعمال 4 : 8 - 12" },
            { t: "مزمور العشية", r: "مزمور 145 : 1 , 2" },
            { t: "إنجيل العشية", r: "لوقا 10 : 1 - 12" }
        ];

        container.innerHTML = `<p style="color:#7f8c8d; margin-bottom:15px;">🕒 ${title}</p>` + 
            readings.map(item => `
                <div class="katamaros-item">
                    <span class="katamaros-title">📍 ${item.t}</span>
                    <p>${item.r}</p>
                </div>
            `).join('');
    }

    // التقويم القبطي
    function displayCoptic() {
        const today = new Date();
        const months = ["توت", "بابة", "هاتور", "كيهك", "طوبة", "أمشير", "برمهات", "برمودة", "بشنس", "بؤونة", "أبيب", "مسرى", "نسيئ"];
        const day = (today.getDate() % 30) || 30;
        const month = months[Math.floor(today.getMonth() % 12)];
        document.getElementById('copticInfo').innerHTML = `
            <div class="verse-card" style="text-align:center">
                <div style="font-size:2.2rem; color:#c9a03d">📅 ${day} ${month} 1742</div>
                <p style="margin-top:20px; font-size:1.1rem;">"هذا هو اليوم الذي صنعه الرب، نبتهج ونفرح به"</p>
            </div>`;
    }

    function saveCurrentVerse() {
        let fav = JSON.parse(localStorage.getItem('my_favs_final') || '[]');
        if (fav.some(v => v.text === currentVerse.text)) return;
        fav.push(currentVerse);
        localStorage.setItem('my_favs_final', JSON.stringify(fav));
        displayFavs();
    }

    function displayFavs() {
        const fav = JSON.parse(localStorage.getItem('my_favs_final') || '[]');
        const container = document.getElementById('favVersesList');
        if (fav.length === 0) return;
        container.innerHTML = '<h3 style="margin:20px 0 10px; color:#2c3e50;">⭐ المحفوظات</h3>' + 
            fav.map(v => `
                <div style="background:white; padding:15px; border-radius:20px; margin-bottom:10px; border-right:3px solid #c9a03d; box-shadow:0 2px 5px rgba(0,0,0,0.05);">
                    <div style="font-size:0.95rem;">"${v.text}"</div>
                    <div style="color:#c9a03d; font-weight:bold; font-size:0.8rem; margin-top:5px;">${v.ref}</div>
                </div>`).join('');
    }

    function shareCurrentVerse() {
        const t = `"${currentVerse.text}"\n📖 ${currentVerse.ref}`;
        if(navigator.share) navigator.share({text: t});
        else { navigator.clipboard.writeText(t); alert("تم نسخ الآية"); }
    }

    window.onload = () => {
        loadNewVerse();
        loadKatamaros();
        displayCoptic();
        displayFavs();
        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.content').forEach(x => x.classList.remove('active-content'));
                t.classList.add('active');
                document.getElementById(t.dataset.tab).classList.add('active-content');
            };
        });
    };
</script>
</body>
</html>
