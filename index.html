<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات - كتابك المقدس</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: "✝";
            position: fixed;
            font-size: 350px;
            opacity: 0.03;
            bottom: -80px;
            left: -80px;
            pointer-events: none;
            font-family: serif;
            color: #c9a03d;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: white;
            border-radius: 60px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }

        .cross-icon {
            font-size: 50px;
            color: #c9a03d;
            margin-bottom: 10px;
            display: inline-block;
            animation: gentleGlow 2s ease-in-out infinite;
        }

        @keyframes gentleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(201, 160, 61, 0.3); }
            50% { text-shadow: 0 0 15px rgba(201, 160, 61, 0.5); }
        }

        .header h1 {
            font-size: 2rem;
            color: #2c3e50;
        }

        .header h1 span {
            color: #c9a03d;
        }

        .tabs {
            display: flex;
            background: white;
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            color: #7f8c8d;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .tab.active {
            background: linear-gradient(135deg, #c9a03d, #b8860b);
            color: white;
        }

        .content {
            display: none;
            background: white;
            border-radius: 35px;
            padding: 30px;
            min-height: 400px;
            animation: fadeIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.15);
        }

        .content.active-content {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verse-card {
            background: #fefefe;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            border-right: 5px solid #c9a03d;
        }

        .verse-text {
            font-size: 1.5rem;
            color: #2c3e50;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .verse-ref {
            color: #c9a03d;
            font-size: 1rem;
            font-weight: bold;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Amiri', serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-gold {
            background: linear-gradient(135deg, #c9a03d, #b8860b);
        }

        .favorites-section {
            margin-top: 25px;
            background: #fafafa;
            border-radius: 25px;
            padding: 20px;
        }

        .favorite-item {
            background: white;
            border-radius: 15px;
            padding: 12px;
            margin: 10px 0;
            border-right: 3px solid #c9a03d;
            position: relative;
        }

        .delete-fav {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 20px;
            cursor: pointer;
            float: left;
            font-size: 0.7rem;
        }

        .coptic-date {
            font-size: 2.2rem;
            color: #c9a03d;
            margin: 20px 0;
            font-weight: bold;
        }

        .loading::after {
            content: "✝";
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        @media (max-width: 550px) {
            .verse-text { font-size: 1.2rem; }
            .header h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
        <p>آيات من الكتاب المقدس والتقويم القبطي</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="coptic">📅 تقويم</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div class="verse-text" id="verseText"><span class="loading"></span> جاري التحميل...</div>
            <div class="verse-ref" id="verseRef"></div>
            <div class="actions">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ</button>
                <button class="btn" onclick="shareCurrentVerse()">📤 مشاركة</button>
            </div>
        </div>
        <div class="favorites-section">
            <h3>⭐ المفضلة</h3>
            <div id="favVersesList"></div>
        </div>
    </div>

    <div id="coptic" class="content" style="text-align:center;">
        <div id="copticInfo"></div>
    </div>
</div>

<script>
    let currentVerse = { text: "", ref: "" };

    // 1. نظام جلب الآيات (Bolls Life API)
    async function fetchVerseFromAPI() {
        const randomBook = Math.floor(Math.random() * 66) + 1;
        const randomChapter = Math.floor(Math.random() * 20) + 1;
        const randomVerse = Math.floor(Math.random() * 10) + 1;

        try {
            const response = await fetch(`https://bolls.life/get-verse/SVD/${randomBook}/${randomChapter}/${randomVerse}/`);
            const data = await response.json();
            if (data && data.text) {
                return { 
                    text: data.text.replace(/^\d+\s*/, '').trim(), 
                    ref: `${data.book_name} ${data.chapter}:${data.verse}` 
                };
            }
            throw new Error();
        } catch(e) {
            return { text: "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.", ref: "فيلبي 4:13" };
        }
    }

    async function loadNewVerse() {
        const vt = document.getElementById('verseText');
        const vr = document.getElementById('verseRef');
        vt.innerHTML = '<span class="loading"></span> جاري التحميل...';
        vr.innerText = '';
        const verse = await fetchVerseFromAPI();
        currentVerse = verse;
        vt.innerText = `"${verse.text}"`;
        vr.innerText = verse.ref;
    }

    // 2. نظام التقويم القبطي الدقيق
    function getCopticDate() {
        let date = new Date();
        const hour = date.getHours();
        let isNextDay = false;

        if (hour >= 17) {
            date.setDate(date.getDate() + 1);
            isNextDay = true;
        }

        const cMonths = ["توت", "بابة", "هاتور", "كيهك", "طوبة", "أمشير", "برمهات", "برمودة", "بشنس", "بؤونة", "أبيب", "مسرى", "نسيئ"];
        
        // حساب دقيق يعتمد على مرجع ثابت (27 أبريل = 19 برمودة)
        const refG = new Date(2026, 3, 27); // 27 April 2026
        const refC = { d: 19, m: 7, y: 1742 }; // 19 Baramouda 1742

        const diffTime = date - refG;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

        let totalDays = (refC.d - 1) + diffDays;
        let cDay = (totalDays % 30) + 1;
        let cMonthIdx = (refC.m + Math.floor(totalDays / 30)) % 13;
        let cYear = refC.y + Math.floor((refC.m + Math.floor(totalDays / 30)) / 13);

        if (cDay <= 0) { cDay += 30; cMonthIdx--; }

        return {
            coptic: `${cDay} ${cMonths[cMonthIdx]} ${cYear}`,
            gregorian: date.toLocaleDateString('ar-EG', { day:'numeric', month:'long', year:'numeric'}),
            isNextDay: isNextDay
        };
    }

    function displayCopticInfo() {
        const d = getCopticDate();
        document.getElementById('copticInfo').innerHTML = `
            <div class="verse-card">
                <div class="coptic-date">📅 ${d.coptic}</div>
                <div class="verse-text" style="font-size:1.2rem">الموافق: ${d.gregorian}</div>
                <p style="color:#7f8c8d; font-size:0.8rem; margin-top:5px;">
                    ${d.isNextDay ? "🕒 توقيت الغد (بعد الساعة 5 مساءً)" : "🕒 توقيت اليوم السليم"}
                </p>
                <hr style="margin: 15px 0; opacity: 0.1;">
                <div class="verse-text" style="font-size:1rem;">✝ "اذكروا أعمال الرب التي صنعها، عجائبه وأحكام فمه." ✝</div>
                <div class="verse-ref">مزمور 105: 5</div>
            </div>
        `;
    }

    // 3. المفضلة والمشاركة
    function saveCurrentVerse() {
        let fav = JSON.parse(localStorage.getItem('fav_verses_final') || '[]');
        if (fav.some(v => v.text === currentVerse.text)) return alert("موجودة بالفعل");
        fav.push(currentVerse);
        localStorage.setItem('fav_verses_final', JSON.stringify(fav));
        displayFavVerses();
    }

    function displayFavVerses() {
        const fav = JSON.parse(localStorage.getItem('fav_verses_final') || '[]');
        const container = document.getElementById('favVersesList');
        if (!fav.length) { container.innerHTML = '<p style="text-align:center; color:#999;">لا يوجد محفوظات</p>'; return; }
        container.innerHTML = fav.map((v, i) => `
            <div class="favorite-item">
                <button class="delete-fav" onclick="deleteFav(${i})">🗑</button>
                <div style="font-size:0.9rem;">"${v.text}"</div>
                <div style="color:#c9a03d; font-size:0.8rem;">${v.ref}</div>
            </div>`).join('');
    }

    function deleteFav(i) {
        let fav = JSON.parse(localStorage.getItem('fav_verses_final') || '[]');
        fav.splice(i, 1);
        localStorage.setItem('fav_verses_final', JSON.stringify(fav));
        displayFavVerses();
    }

    function shareCurrentVerse() {
        const t = `"${currentVerse.text}"\n📖 ${currentVerse.ref}`;
        if (navigator.share) navigator.share({ title: 'آية', text: t });
        else { navigator.clipboard.writeText(t); alert("تم النسخ"); }
    }

    // إعداد التبويبات
    window.onload = () => {
        loadNewVerse();
        displayCopticInfo();
        displayFavVerses();
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active-content'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active-content');
            };
        });
    };
</script>
</body>
</html>
