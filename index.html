<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات - كتابك المقدس</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: "✝";
            position: fixed;
            font-size: 350px;
            opacity: 0.03;
            bottom: -80px;
            left: -80px;
            pointer-events: none;
            font-family: serif;
            color: #c9a03d;
        }

        .container {
            max-width: 650px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: white;
            border-radius: 60px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }

        .cross-icon {
            font-size: 50px;
            color: #c9a03d;
            margin-bottom: 10px;
            display: inline-block;
            animation: gentleGlow 2s ease-in-out infinite;
        }

        @keyframes gentleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(201, 160, 61, 0.3); }
            50% { text-shadow: 0 0 15px rgba(201, 160, 61, 0.5); }
        }

        .header h1 {
            font-size: 2rem;
            color: #2c3e50;
            letter-spacing: -0.5px;
        }

        .header h1 span {
            color: #c9a03d;
        }

        .header p {
            color: #7f8c8d;
            font-size: 0.85rem;
            margin-top: 5px;
        }

        .tabs {
            display: flex;
            background: white;
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            color: #7f8c8d;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: bold;
            font-size: 0.85rem;
        }

        .tab.active {
            background: linear-gradient(135deg, #c9a03d, #b8860b);
            color: white;
            box-shadow: 0 3px 10px rgba(201, 160, 61, 0.3);
        }

        .content {
            display: none;
            background: white;
            border-radius: 35px;
            padding: 30px;
            min-height: 400px;
            animation: fadeIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.15);
        }

        .content.active-content {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verse-card {
            background: #fefefe;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            border-right: 5px solid #c9a03d;
            box-shadow: 0 5px 15px rgba(0,0,0,0.03);
        }

        .verse-text {
            font-size: 1.5rem;
            color: #2c3e50;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .verse-ref {
            color: #c9a03d;
            font-size: 1rem;
            font-weight: bold;
            text-align: left;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Amiri', serif;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .btn-gold {
            background: linear-gradient(135deg, #c9a03d, #b8860b);
        }

        .favorites-section {
            margin-top: 25px;
            background: #fafafa;
            border-radius: 25px;
            padding: 20px;
        }

        .favorite-item {
            background: white;
            border-radius: 15px;
            padding: 12px;
            margin: 10px 0;
            border-right: 3px solid #c9a03d;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .loading {
            text-align: center;
            padding: 30px;
            color: #c9a03d;
        }

        .katamaros-list {
            list-style: none;
        }

        .katamaros-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }

        .katamaros-title {
            color: #c9a03d;
            font-weight: bold;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
        <p>آيات من الكتاب المقدس - العهد القديم والجديد</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="katamaros">⛪ قطمارس</div>
        <div class="tab" data-tab="coptic">📅 تقويم</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div class="verse-text" id="verseText"><span class="loading"></span> جاري تحميل الآية...</div>
            <div class="verse-ref" id="verseRef"></div>
            <div class="actions">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ</button>
                <button class="btn" onclick="shareCurrentVerse()">📤 مشاركة</button>
            </div>
        </div>
        <div class="favorites-section">
            <h3>⭐ المحفوظات</h3>
            <div id="favVersesList"></div>
        </div>
    </div>

    <div id="katamaros" class="content">
        <h2 style="color:#2c3e50; margin-bottom:15px; border-bottom:2px solid #c9a03d; display:inline-block;">قراءات اليوم</h2>
        <div id="katamarosContent" class="katamaros-list">جاري تحميل القطمارس...</div>
    </div>

    <div id="coptic" class="content">
        <div class="coptic-info" id="copticInfo"></div>
    </div>
</div>

<script>
    let currentVerse = { text: "", ref: "" };

    async function fetchVerseFromAPI() {
        const randomBook = Math.floor(Math.random() * 66) + 1;
        const randomChapter = Math.floor(Math.random() * 20) + 1;
        const randomVerse = Math.floor(Math.random() * 10) + 1;

        try {
            const response = await fetch(`https://bolls.life/get-verse/SVD/${randomBook}/${randomChapter}/${randomVerse}/`);
            const data = await response.json();
            return {
                text: data.text.replace(/^\d+\s*/, '').trim(),
                ref: `${data.book_name} ${data.chapter}:${data.verse}`
            };
        } catch (e) {
            return { text: "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.", ref: "إشعياء 41:10" };
        }
    }

    async function loadNewVerse() {
        const vt = document.getElementById('verseText');
        const vr = document.getElementById('verseRef');
        vt.innerHTML = '<span class="loading"></span> جاري التحميل...';
        const v = await fetchVerseFromAPI();
        currentVerse = v;
        vt.innerText = `"${v.text}"`;
        vr.innerText = v.ref;
    }

    async function loadKatamaros() {
        const container = document.getElementById('katamarosContent');
        // شواهد افتراضية لليوم (القطمارس اليومي)
        const readings = [
            { t: "البولس", r: "رومية 8 : 28 - 39" },
            { t: "الكاثوليكون", r: "1 يوحنا 2 : 1 - 6" },
            { t: "الإبركسيس", r: "أعمال 4 : 8 - 12" },
            { t: "مزمور العشية", r: "مزمور 145 : 1 , 2" },
            { t: "إنجيل العشية", r: "لوقا 10 : 1 - 12" }
        ];
        container.innerHTML = readings.map(item => `
            <div class="katamaros-item">
                <span class="katamaros-title">📍 ${item.t}</span>
                <p>${item.r}</p>
            </div>
        `).join('');
    }

    function saveCurrentVerse() {
        let fav = JSON.parse(localStorage.getItem('my_favs') || '[]');
        if (fav.some(v => v.text === currentVerse.text)) return alert("موجودة بالفعل");
        fav.push(currentVerse);
        localStorage.setItem('my_favs', JSON.stringify(fav));
        displayFavs();
    }

    function displayFavs() {
        const fav = JSON.parse(localStorage.getItem('my_favs') || '[]');
        const container = document.getElementById('favVersesList');
        container.innerHTML = fav.map(v => `
            <div class="favorite-item">
                <div style="font-size:0.9rem">"${v.text}"</div>
                <div style="color:#c9a03d; font-size:0.75rem">${v.ref}</div>
            </div>
        `).join('');
    }

    function displayCopticDate() {
        const today = new Date();
        const months = ["توت", "بابة", "هاتور", "كيهك", "طوبة", "أمشير", "برمهات", "برمودة", "بشنس", "بؤونة", "أبيب", "مسرى", "نسيئ"];
        const cDay = (today.getDate() % 30) || 30;
        const cMonth = months[Math.floor(today.getMonth() % 12)];
        document.getElementById('copticInfo').innerHTML = `
            <div class="verse-card" style="text-align:center">
                <div style="font-size:2rem; color:#c9a03d">📅 ${cDay} ${cMonth} 1742</div>
                <div class="verse-text" style="font-size:1.1rem; margin-top:15px">"هذا هو اليوم الذي صنعه الرب، نبتهج ونفرح به"</div>
            </div>
        `;
    }

    function shareCurrentVerse() {
        const t = `"${currentVerse.text}"\n📖 ${currentVerse.ref}`;
        if(navigator.share) navigator.share({text: t});
        else alert("تم النسخ: " + t);
    }

    window.onload = () => {
        loadNewVerse();
        loadKatamaros();
        displayFavs();
        displayCopticDate();
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active-content'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active-content');
            };
        });
    };
</script>
</body>
</html>
