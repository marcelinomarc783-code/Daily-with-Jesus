<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 650px; margin: 0 auto; }
        .header {
            text-align: center; padding: 30px 20px; background: white;
            border-radius: 60px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .cross-icon { font-size: 50px; color: #c9a03d; margin-bottom: 10px; display: inline-block; }
        .header h1 { font-size: 2rem; color: #2c3e50; }
        .tabs { display: flex; background: white; border-radius: 60px; padding: 5px; margin-bottom: 25px; border: 1px solid rgba(201, 160, 61, 0.2); }
        .tab { flex: 1; text-align: center; padding: 12px; color: #7f8c8d; cursor: pointer; border-radius: 50px; font-weight: bold; }
        .tab.active { background: linear-gradient(135deg, #c9a03d, #b8860b); color: white; }
        .content { display: none; background: white; border-radius: 35px; padding: 30px; min-height: 350px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .content.active-content { display: block; }
        .verse-card { background: #fefefe; border-radius: 25px; padding: 25px; border-right: 5px solid #c9a03d; margin-bottom: 20px; }
        .verse-text { font-size: 1.5rem; color: #2c3e50; line-height: 1.8; margin-bottom: 15px; }
        .verse-ref { color: #c9a03d; font-size: 1.1rem; font-weight: bold; text-align: left; }
        .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .btn { background: #2c3e50; color: white; border: none; padding: 10px 22px; border-radius: 50px; cursor: pointer; font-family: 'Amiri'; }
        .btn-gold { background: #c9a03d; }
        .loading { text-align: center; color: #c9a03d; padding: 20px; font-weight: bold; }
        .error-msg { color: #dc3545; text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="favs">❤️ المفضلة</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div id="displayArea">
                <div class="loading">جاري جلب آية...</div>
            </div>
            <div class="actions">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ</button>
            </div>
        </div>
    </div>

    <div id="favs" class="content">
        <div id="favList"></div>
    </div>
</div>

<script>
    let currentVerse = null;

    async function fetchVerseFromAPI() {
        // نستخدم API بديل وأكثر استقراراً
        try {
            const response = await fetch('https://api.al-kalema.com/v1/verse/random');
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            // تطبيق التعديلات اللي طلبتها (الاسم، الشابتر، تنظيف النص)
            return {
                text: data.text.replace(/^\d+\s*/, '').trim(),
                ref: `${data.book_name} ${data.chapter}:${data.verse}`
            };
        } catch (err) {
            console.error("API Error:", err);
            return null;
        }
    }

    async function loadNewVerse() {
        const display = document.getElementById('displayArea');
        display.innerHTML = '<div class="loading">جاري الاتصال بالسيرفر...</div>';
        
        const verse = await fetchVerseFromAPI();
        
        if (verse) {
            currentVerse = verse;
            display.innerHTML = `
                <div class="verse-text">"${verse.text}"</div>
                <div class="verse-ref">${verse.ref}</div>
            `;
        } else {
            display.innerHTML = '<div class="error-msg">⚠️ عذراً، تعذر الاتصال بالـ API. تأكد من الإنترنت أو حاول لاحقاً.</div>';
        }
    }

    function saveCurrentVerse() {
        if (!currentVerse) return;
        let favs = JSON.parse(localStorage.getItem('my_favs') || '[]');
        if (favs.some(v => v.text === currentVerse.text)) return alert("موجودة بالفعل!");
        favs.push(currentVerse);
        localStorage.setItem('my_favs', JSON.stringify(favs));
        renderFavs();
    }

    function renderFavs() {
        const list = document.getElementById('favList');
        let favs = JSON.parse(localStorage.getItem('my_favs') || '[]');
        if (favs.length === 0) {
            list.innerHTML = '<p style="text-align:center;">لا يوجد محفوظات</p>';
            return;
        }
        list.innerHTML = favs.map((v, i) => `
            <div class="verse-card" style="padding:15px; font-size:0.9rem">
                <div>${v.text}</div>
                <div style="color:#c9a03d; font-weight:bold">${v.ref}</div>
                <button onclick="deleteFav(${i})" style="color:red; border:none; background:none; cursor:pointer; margin-top:5px;">حذف</button>
            </div>
        `).join('');
    }

    function deleteFav(i) {
        let favs = JSON.parse(localStorage.getItem('my_favs') || '[]');
        favs.splice(i, 1);
        localStorage.setItem('my_favs', JSON.stringify(favs));
        renderFavs();
    }

    document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.remove('active-content'));
            tab.classList.add('active');
            document.getElementById(tab.dataset.tab).classList.add('active-content');
        });
    });

    window.onload = () => {
        loadNewVerse();
        renderFavs();
    };
</script>
</body>
</html>
