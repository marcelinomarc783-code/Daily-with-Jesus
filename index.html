<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات - كتابك المقدس</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: "✝"; position: fixed; font-size: 350px; opacity: 0.03;
            bottom: -80px; left: -80px; pointer-events: none; color: #c9a03d;
        }
        .container { max-width: 650px; margin: 0 auto; }
        .header {
            text-align: center; padding: 30px 20px; background: white;
            border-radius: 60px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .cross-icon {
            font-size: 50px; color: #c9a03d; margin-bottom: 10px;
            display: inline-block; animation: gentleGlow 2s ease-in-out infinite;
        }
        @keyframes gentleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(201, 160, 61, 0.3); }
            50% { text-shadow: 0 0 15px rgba(201, 160, 61, 0.5); }
        }
        .header h1 { font-size: 2rem; color: #2c3e50; }
        .header h1 span { color: #c9a03d; }
        .tabs {
            display: flex; background: white; border-radius: 60px;
            padding: 5px; margin-bottom: 25px; border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .tab {
            flex: 1; text-align: center; padding: 12px; color: #7f8c8d;
            cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s;
            font-size: 0.85rem;
        }
        .tab.active { background: linear-gradient(135deg, #c9a03d, #b8860b); color: white; }
        .content {
            display: none; background: white; border-radius: 35px;
            padding: 30px; min-height: 400px; animation: fadeIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(201, 160, 61, 0.15);
        }
        .content.active-content { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .verse-card {
            background: #fefefe; border-radius: 25px; padding: 25px;
            margin-bottom: 20px; border-right: 5px solid #c9a03d;
        }
        .verse-text { font-size: 1.5rem; color: #2c3e50; line-height: 1.8; margin-bottom: 15px; }
        .verse-ref { color: #c9a03d; font-size: 1rem; font-weight: bold; }
        .btn {
            background: #2c3e50; color: white; border: none; padding: 10px 22px;
            border-radius: 50px; cursor: pointer; font-family: 'Amiri'; margin: 5px; transition: 0.3s;
        }
        .btn-gold { background: #c9a03d; }
        .katamaros-item { padding: 15px; border-bottom: 1px solid #eee; }
        .katamaros-title { color: #c9a03d; font-weight: bold; display: block; }
        .loading::after { content: "✝"; display: inline-block; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
        <p>آيات من الكتاب المقدس والقطمارس اليومي</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="katamaros">⛪ قطمارس</div>
        <div class="tab" data-tab="coptic">📅 تقويم</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div class="verse-text" id="verseText">جاري تحميل الآية...</div>
            <div class="verse-ref" id="verseRef"></div>
            <div class="actions" style="margin-top:20px;">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ للمفضلة</button>
            </div>
        </div>
        <div id="favVersesList" style="margin-top:20px;"></div>
    </div>

    <div id="katamaros" class="content">
        <div id="katamarosStatus" style="color:#7f8c8d; margin-bottom:15px; font-size:0.9rem;"></div>
        <div id="katamarosContent"></div>
    </div>

    <div id="coptic" class="content">
        <div id="copticInfo"></div>
    </div>
</div>

<script>
    let currentVerse = { text: "", ref: "" };

    // --- 1. نظام الآيات (API "كلمة") ---
    async function loadNewVerse() {
        const vt = document.getElementById('verseText');
        const vr = document.getElementById('verseRef');
        vt.innerHTML = '<span class="loading"></span> جاري التحميل...';
        vr.innerText = "";
        try {
            const res = await fetch('https://api.al-kalema.com/v1/verse/random');
            const data = await res.json();
            currentVerse = { text: data.text.trim(), ref: `${data.book_name} ${data.chapter}:${data.verse}` };
            vt.innerText = `"${currentVerse.text}"`;
            vr.innerText = currentVerse.ref;
        } catch(e) {
            vt.innerText = "لاَ تَخَفْ لأَنِّي مَعَكَ. لاَ تَتَلَفَّتْ لأَنِّي إِلهُكَ.";
            vr.innerText = "إشعياء 41:10";
        }
    }

    // --- 2. نظام القطمارس الذكي (الساعة 5) ---
    function loadKatamaros() {
        const container = document.getElementById('katamarosContent');
        const status = document.getElementById('katamarosStatus');
        const now = new Date();
        const hour = now.getHours();

        if (hour >= 17) {
            now.setDate(now.getDate() + 1);
            status.innerText = "🕒 يتم الآن عرض قراءات غداً (نظام ما بعد 5 مساءً)";
        } else {
            status.innerText = "🕒 يتم الآن عرض قراءات اليوم";
        }

        const day = (now.getDate() % 30) || 30; 
        const cMonth = "برمودة"; // كمثال

        const readings = [
            { t: "مزمور عشية", r: "مزمور 6 : 56" },
            { t: "إنجيل عشية", r: "لوقا 10 : 1 - 12" },
            { t: "البولس", r: "رومية 8 : 28 - 39" },
            { t: "الكاثوليكون", r: "1 يوحنا 2 : 1 - 6" },
            { t: "الإبركسيس", r: "أعمال 4 : 8 - 12" },
            { t: "إنجيل القداس", r: "لوقا 10 : 1 - 12" }
        ];

        container.innerHTML = `<h3 style="margin-bottom:15px; color:#2c3e50;">⛪ شواهد ${day} ${cMonth}</h3>` + 
            readings.map(item => `
                <div class="katamaros-item">
                    <span class="katamaros-title">📍 ${item.t}</span>
                    <p>${item.r}</p>
                </div>
            `).join('');
    }

    // --- 3. التقويم والمفضلة ---
    function displayCoptic() {
        const now = new Date();
        const day = (now.getDate() % 30) || 30;
        document.getElementById('copticInfo').innerHTML = `
            <div class="verse-card" style="text-align:center">
                <div style="font-size:2rem; color:#c9a03d">📅 ${day} برمودة 1742</div>
                <p style="margin-top:15px; color:#7f8c8d;">الموافق: ${now.toLocaleDateString('ar-EG')}</p>
            </div>`;
    }

    function saveCurrentVerse() {
        let fav = JSON.parse(localStorage.getItem('fav_v') || '[]');
        if (!fav.some(v => v.text === currentVerse.text)) {
            fav.push(currentVerse);
            localStorage.setItem('fav_v', JSON.stringify(fav));
            displayFavs();
        }
    }

    function displayFavs() {
        const fav = JSON.parse(localStorage.getItem('fav_v') || '[]');
        const container = document.getElementById('favVersesList');
        container.innerHTML = fav.length ? '<h3 style="margin-bottom:10px;">⭐ المحفوظة</h3>' : '';
        container.innerHTML += fav.map(v => `
            <div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; border-right:3px solid #c9a03d; font-size:0.9rem;">
                "${v.text}" <br> <small style="color:#c9a03d">${v.ref}</small>
            </div>`).join('');
    }

    // التحكم في التبويبات
    window.onload = () => {
        loadNewVerse();
        loadKatamaros();
        displayCoptic();
        displayFavs();
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active-content'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active-content');
            };
        });
    };
</script>
</body>
</html>
