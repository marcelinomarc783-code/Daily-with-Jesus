<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات - كتابك المقدس</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: "✝"; position: fixed; font-size: 350px; opacity: 0.03;
            bottom: -80px; left: -80px; pointer-events: none; color: #c9a03d;
        }
        .container { max-width: 650px; margin: 0 auto; }
        .header {
            text-align: center; padding: 30px 20px; background: white;
            border-radius: 60px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .cross-icon {
            font-size: 50px; color: #c9a03d; margin-bottom: 10px;
            display: inline-block; animation: gentleGlow 2s ease-in-out infinite;
        }
        @keyframes gentleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(201, 160, 61, 0.3); }
            50% { text-shadow: 0 0 15px rgba(201, 160, 61, 0.5); }
        }
        .header h1 { font-size: 2rem; color: #2c3e50; }
        .header h1 span { color: #c9a03d; }
        .tabs {
            display: flex; background: white; border-radius: 60px;
            padding: 5px; margin-bottom: 25px; border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .tab {
            flex: 1; text-align: center; padding: 12px; color: #7f8c8d;
            cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s;
            font-size: 0.85rem;
        }
        .tab.active { background: linear-gradient(135deg, #c9a03d, #b8860b); color: white; }
        .content {
            display: none; background: white; border-radius: 35px;
            padding: 30px; min-height: 400px; animation: fadeIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); border: 1px solid rgba(201, 160, 61, 0.15);
        }
        .content.active-content { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .verse-card {
            background: #fefefe; border-radius: 25px; padding: 25px;
            margin-bottom: 20px; border-right: 5px solid #c9a03d;
        }
        .verse-text { font-size: 1.45rem; color: #2c3e50; line-height: 1.8; margin-bottom: 15px; }
        .verse-ref { color: #c9a03d; font-size: 1rem; font-weight: bold; }
        .btn {
            background: #2c3e50; color: white; border: none; padding: 10px 22px;
            border-radius: 50px; cursor: pointer; font-family: 'Amiri'; margin: 5px; transition: 0.3s;
        }
        .btn-gold { background: #c9a03d; }
        .katamaros-item {
            background: #fafafa; border-radius: 20px; padding: 15px;
            margin-bottom: 15px; border-right: 4px solid #c9a03d;
        }
        .katamaros-title { color: #2c3e50; font-weight: bold; display: block; margin-bottom: 5px; }
        .loading { text-align: center; color: #c9a03d; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
        <p>آيات من الكتاب المقدس والقطمارس اليومي</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="katamaros">⛪ قطمارس</div>
        <div class="tab" data-tab="coptic">📅 تقويم</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div class="verse-text" id="verseText">جاري التحميل...</div>
            <div class="verse-ref" id="verseRef"></div>
            <div class="actions">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ</button>
            </div>
        </div>
        <div id="favVersesList"></div>
    </div>

    <div id="katamaros" class="content">
        <div id="katamarosContent">جاري تحميل القراءات...</div>
    </div>

    <div id="coptic" class="content">
        <div id="copticInfo"></div>
    </div>
</div>

<script>
    let currentVerse = { text: "", ref: "" };

    // 1. آية اليوم العشوائية
    async function loadNewVerse() {
        const vt = document.getElementById('verseText');
        const vr = document.getElementById('verseRef');
        vt.innerHTML = "جاري التحميل...";
        try {
            const res = await fetch('https://api.al-kalema.com/v1/verse/random');
            const data = await res.json();
            currentVerse = { text: data.text.replace(/^\d+\s*/, '').trim(), ref: `${data.book_name} ${data.chapter}:${data.verse}` };
            vt.innerText = `"${currentVerse.text}"`;
            vr.innerText = currentVerse.ref;
        } catch(e) {
            vt.innerText = "لاَ تَخَفْ لأَنِّي مَعَكَ."; vr.innerText = "إشعياء 41:10";
        }
    }

    // 2. القطمارس - يقلب الساعة 5 مساءً ويعرض النص
    async function loadKatamaros() {
        const container = document.getElementById('katamarosContent');
        const now = new Date();
        const hour = now.getHours();
        
        if (hour >= 17) { now.setDate(now.getDate() + 1); } // قلب اليوم الساعة 5 مساءً
        
        const title = hour >= 17 ? "قراءات غداً" : "قراءات اليوم";
        
        // شواهد اليوم (يمكنك تحديثها)
        const readings = [
            { type: "البولس", ref: "رومية 8:28" },
            { type: "الكاثوليكون", ref: "1 يوحنا 2:1" },
            { type: "إنجيل القداس", ref: "لوقا 10:1" }
        ];

        container.innerHTML = `<h2 style="color:#c9a03d; margin-bottom:15px;">⛪ ${title}</h2>`;

        for (let item of readings) {
            try {
                const res = await fetch(`https://api.al-kalema.com/v1/verse?ref=${item.ref}`);
                const data = await res.json();
                container.innerHTML += `
                    <div class="katamaros-item">
                        <span class="katamaros-title">📍 ${item.type}</span>
                        <small style="color:#c9a03d;">(${item.ref})</small>
                        <p style="margin-top:10px; font-size:0.95rem; line-height:1.6;">${data.text || "النص غير متوفر حالياً"}</p>
                    </div>`;
            } catch(e) { container.innerHTML += `<p>خطأ في تحميل ${item.type}</p>`; }
        }
    }

    // 3. التقويم القبطي
    function displayCoptic() {
        const today = new Date();
        const months = ["توت", "بابة", "هاتور", "كيهك", "طوبة", "أمشير", "برمهات", "برمودة", "بشنس", "بؤونة", "أبيب", "مسرى", "نسيئ"];
        const day = (today.getDate() % 30) || 30;
        const month = months[Math.floor(today.getMonth() % 12)];
        document.getElementById('copticInfo').innerHTML = `
            <div class="verse-card" style="text-align:center">
                <div style="font-size:2rem; color:#c9a03d">📅 ${day} ${month} 1742</div>
                <p style="margin-top:15px;">"اِفْرَحُوا فِي الرَّبِّ كُلَّ حِينٍ"</p>
            </div>`;
    }

    // 4. الحفظ والمفضلة
    function saveCurrentVerse() {
        let fav = JSON.parse(localStorage.getItem('my_favs') || '[]');
        if (!fav.some(v => v.text === currentVerse.text)) {
            fav.push(currentVerse);
            localStorage.setItem('my_favs', JSON.stringify(fav));
            displayFavs();
        }
    }

    function displayFavs() {
        const fav = JSON.parse(localStorage.getItem('my_favs') || '[]');
        const container = document.getElementById('favVersesList');
        container.innerHTML = fav.length ? '<h3 style="margin:20px 0 10px;">⭐ المحفوظات</h3>' : '';
        container.innerHTML += fav.map(v => `
            <div class="favorite-item" style="background:white; padding:10px; border-radius:15px; margin-bottom:10px; border-right:3px solid #c9a03d;">
                <div style="font-size:0.9rem;">"${v.text}"</div>
                <div style="color:#c9a03d; font-size:0.7rem;">${v.ref}</div>
            </div>`).join('');
    }

    // 5. تهيئة التبويبات والتشغيل
    window.onload = () => {
        loadNewVerse();
        loadKatamaros();
        displayCoptic();
        displayFavs();
        document.querySelectorAll('.tab').forEach(t => {
            t.onclick = () => {
                document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
                document.querySelectorAll('.content').forEach(x => x.classList.remove('active-content'));
                t.classList.add('active');
                document.getElementById(t.dataset.tab).classList.add('active-content');
            };
        });
    };
</script>
</body>
</html>
