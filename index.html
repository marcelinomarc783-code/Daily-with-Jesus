<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات - كتابك المقدس</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }
        body::before {
            content: "✝"; position: fixed; font-size: 350px; opacity: 0.03;
            bottom: -80px; left: -80px; pointer-events: none; color: #c9a03d;
        }
        .container { max-width: 650px; margin: 0 auto; }
        .header {
            text-align: center; padding: 30px 20px; background: white;
            border-radius: 60px; margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .cross-icon {
            font-size: 50px; color: #c9a03d; margin-bottom: 10px;
            display: inline-block; animation: gentleGlow 2s ease-in-out infinite;
        }
        @keyframes gentleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(201, 160, 61, 0.3); }
            50% { text-shadow: 0 0 15px rgba(201, 160, 61, 0.5); }
        }
        .header h1 { font-size: 2rem; color: #2c3e50; }
        .header h1 span { color: #c9a03d; }
        .tabs {
            display: flex; background: white; border-radius: 60px;
            padding: 5px; margin-bottom: 25px; border: 1px solid rgba(201, 160, 61, 0.2);
        }
        .tab {
            flex: 1; text-align: center; padding: 12px; color: #7f8c8d;
            cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s;
        }
        .tab.active { background: linear-gradient(135deg, #c9a03d, #b8860b); color: white; }
        .content {
            display: none; background: white; border-radius: 35px;
            padding: 30px; min-height: 400px; animation: fadeIn 0.4s ease;
        }
        .content.active-content { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .verse-card {
            background: #fefefe; border-radius: 25px; padding: 25px;
            margin-bottom: 20px; border-right: 5px solid #c9a03d;
        }
        .verse-text { font-size: 1.5rem; color: #2c3e50; line-height: 1.8; margin-bottom: 15px; }
        .verse-ref { color: #c9a03d; font-size: 1rem; font-weight: bold; text-align: left; }
        .btn {
            background: #2c3e50; color: white; border: none; padding: 10px 22px;
            border-radius: 50px; cursor: pointer; font-family: 'Amiri'; margin: 5px;
        }
        .btn-gold { background: #c9a03d; }
        .favorite-item {
            background: white; border-radius: 15px; padding: 12px;
            margin: 10px 0; border-right: 3px solid #c9a03d; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .delete-fav { background: #dc3545; color: white; border: none; padding: 4px 12px; border-radius: 20px; float: left; }
        .loading { text-align: center; color: #c9a03d; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="coptic">📅 تقويم قبطي</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div class="verse-text" id="verseText"><span class="loading"></span> جاري التحميل...</div>
            <div class="verse-ref" id="verseRef"></div>
            <div class="actions">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ</button>
                <button class="btn" onclick="shareCurrentVerse()">📤 مشاركة</button>
            </div>
        </div>
        <div class="favorites-section">
            <h3>⭐ آياتي المفضلة</h3>
            <div id="favVersesList"></div>
        </div>
    </div>

    <div id="coptic" class="content">
        <div id="copticInfo" class="coptic-info"></div>
    </div>
</div>

<script>
    let currentVerse = { text: "", ref: "" };

    // API Bolls Life - أضمن حل للـ CORS والـ GitHub Pages
    async function fetchVerseFromAPI() {
        const randomBook = Math.floor(Math.random() * 66) + 1;
        const randomChapter = Math.floor(Math.random() * 20) + 1;
        const randomVerse = Math.floor(Math.random() * 10) + 1;

        try {
            // طلب من Bolls Life (ترجمة فان دايك SVD)
            const response = await fetch(`https://bolls.life/get-verse/SVD/${randomBook}/${randomChapter}/${randomVerse}/`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            if (data && data.text) {
                return {
                    text: data.text.replace(/^\d+\s*/, '').trim(),
                    ref: `${data.book_name} ${data.chapter}:${data.verse}`
                };
            }
        } catch (e) {
            // محاولة ثانية بـ API بديل لو Bolls Life علق
            try {
                const altRes = await fetch('https://api.al-kalema.com/v1/verse/random');
                const altData = await altRes.json();
                return {
                    text: altData.text.replace(/^\d+\s*/, '').trim(),
                    ref: `${altData.book_name} ${altData.chapter}:${altData.verse}`
                };
            } catch (err) {
                return { text: "برجاء المحاولة مرة أخرى.", ref: "تنبيه" };
            }
        }
    }

    async function loadNewVerse() {
        const vText = document.getElementById('verseText');
        const vRef = document.getElementById('verseRef');
        vText.innerHTML = '<span class="loading"></span> جاري التحميل...';
        vRef.innerHTML = '';
        const verse = await fetchVerseFromAPI();
        currentVerse = verse;
        vText.innerHTML = `"${verse.text}"`;
        vRef.innerHTML = verse.ref;
    }

    function saveCurrentVerse() {
        if (!currentVerse.text || currentVerse.ref === "تنبيه") return;
        let fav = JSON.parse(localStorage.getItem('fav_verses_bolls') || '[]');
        if (fav.some(v => v.text === currentVerse.text)) return alert("موجودة بالفعل!");
        fav.push(currentVerse);
        localStorage.setItem('fav_verses_bolls', JSON.stringify(fav));
        displayFavVerses();
    }

    function displayFavVerses() {
        const fav = JSON.parse(localStorage.getItem('fav_verses_bolls') || '[]');
        const container = document.getElementById('favVersesList');
        container.innerHTML = fav.length === 0 ? '<p style="text-align:center;">لا يوجد آيات محفوظة</p>' : 
        fav.map((v, i) => `
            <div class="favorite-item">
                <button class="delete-fav" onclick="deleteFav(${i})">حذف</button>
                <div>"${v.text}"</div>
                <div style="color:#c9a03d; font-weight:bold; font-size:0.8rem">${v.ref}</div>
            </div>
        `).join('');
    }

    function deleteFav(i) {
        let fav = JSON.parse(localStorage.getItem('fav_verses_bolls') || '[]');
        fav.splice(i, 1);
        localStorage.setItem('fav_verses_bolls', JSON.stringify(fav));
        displayFavVerses();
    }

    function shareCurrentVerse() {
        const text = `"${currentVerse.text}"\n📖 ${currentVerse.ref}`;
        if(navigator.share) navigator.share({ title: 'آية', text: text });
        else { navigator.clipboard.writeText(text); alert("تم النسخ!"); }
    }

    // تقويم قبطي مبسط
    function displayCoptic() {
        const today = new Date();
        const cMonths = ["توت", "بابة", "هاتور", "كيهك", "طوبة", "أمشير", "برمهات", "برمودة", "بشنس", "بؤونة", "أبيب", "مسرى", "نسيئ"];
        const dayOfYear = Math.floor((today - new Date(today.getFullYear(), 0, 0)) / 86400000);
        let cMonth = Math.floor((dayOfYear - 1) / 30);
        let cDay = (dayOfYear - 1) % 30 + 1;
        if (cMonth >= 12) { cMonth = 12; cDay = dayOfYear - 360; }
        document.getElementById('copticInfo').innerHTML = `<div class="verse-card" style="text-align:center"><h2>📅 ${cDay} ${cMonths[cMonth]} ${today.getFullYear()-284}</h2></div>`;
    }

    window.onload = () => {
        loadNewVerse();
        displayFavVerses();
        displayCoptic();
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active-content'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active-content');
            });
        });
    };
</script>
</body>
</html>
