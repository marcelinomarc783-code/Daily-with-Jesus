<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#ffffff">
    <title>مكتبة الآيات - كتابك المقدس</title>
    
    <link rel="manifest" href="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/progressier.json"/>
    <script defer src="https://progressier.app/ZCgRgW8rbI4NZYqbcSeA/script.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Amiri', serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e9ecef 100%);
            min-height: 100vh;
            padding: 20px;
        }

        body::before {
            content: "✝";
            position: fixed;
            font-size: 350px;
            opacity: 0.03;
            bottom: -80px;
            left: -80px;
            pointer-events: none;
            color: #c9a03d;
        }

        .container { max-width: 650px; margin: 0 auto; }

        .header {
            text-align: center;
            padding: 30px 20px;
            background: white;
            border-radius: 60px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }

        .cross-icon {
            font-size: 50px;
            color: #c9a03d;
            margin-bottom: 10px;
            display: inline-block;
            animation: gentleGlow 2s ease-in-out infinite;
        }

        @keyframes gentleGlow {
            0%, 100% { text-shadow: 0 0 5px rgba(201, 160, 61, 0.3); }
            50% { text-shadow: 0 0 15px rgba(201, 160, 61, 0.5); }
        }

        .header h1 { font-size: 2rem; color: #2c3e50; }
        .header h1 span { color: #c9a03d; }

        .tabs {
            display: flex;
            background: white;
            border-radius: 60px;
            padding: 5px;
            margin-bottom: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.2);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            color: #7f8c8d;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            font-weight: bold;
        }

        .tab.active {
            background: linear-gradient(135deg, #c9a03d, #b8860b);
            color: white;
        }

        .content {
            display: none;
            background: white;
            border-radius: 35px;
            padding: 30px;
            min-height: 400px;
            animation: fadeIn 0.4s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(201, 160, 61, 0.15);
        }

        .content.active-content { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .verse-card {
            background: #fefefe;
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 20px;
            border-right: 5px solid #c9a03d;
        }

        .verse-text {
            font-size: 1.5rem;
            color: #2c3e50;
            line-height: 1.8;
            margin-bottom: 15px;
        }

        .verse-ref {
            color: #c9a03d;
            font-size: 1rem;
            font-weight: bold;
        }

        .btn {
            background: linear-gradient(135deg, #2c3e50, #1a252f);
            color: white;
            border: none;
            padding: 10px 22px;
            border-radius: 50px;
            cursor: pointer;
            font-family: 'Amiri', serif;
            margin: 5px;
        }

        .btn-gold { background: linear-gradient(135deg, #c9a03d, #b8860b); }

        .loading::after {
            content: "✝";
            display: inline-block;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="cross-icon">✝</div>
        <h1>📖 <span>مكتبة</span> الآيات</h1>
        <p>آيات من الكتاب المقدس - العهد القديم والجديد</p>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="verses">📖 آيات</div>
        <div class="tab" data-tab="coptic">📅 تقويم قبطي</div>
    </div>

    <div id="verses" class="content active-content">
        <div class="verse-card">
            <div class="verse-text" id="verseText"><span class="loading"></span> جاري تحميل الآية...</div>
            <div class="verse-ref" id="verseRef"></div>
            <div class="actions" style="margin-top:20px;">
                <button class="btn" onclick="loadNewVerse()">🔄 آية جديدة</button>
                <button class="btn btn-gold" onclick="saveCurrentVerse()">❤️ حفظ</button>
                <button class="btn" onclick="shareCurrentVerse()">📤 مشاركة</button>
            </div>
        </div>
        <div id="favVersesList" style="margin-top:25px;"></div>
    </div>

    <div id="coptic" class="content">
        <div id="copticInfo" style="text-align:center;"></div>
    </div>
</div>

<script>
    let currentVerse = { text: "", ref: "" };

    // --- نظام الـ API الأصلي ---
    async function loadNewVerse() {
        const vt = document.getElementById('verseText');
        const vr = document.getElementById('verseRef');
        vt.innerHTML = '<span class="loading"></span> جاري التحميل...';
        vr.innerText = "";
        
        // استخدام API عشوائي للكتب والفصول كما في كودك القديم
        const randomBook = Math.floor(Math.random() * 66) + 1;
        const randomChapter = Math.floor(Math.random() * 20) + 1;
        const randomVer = Math.floor(Math.random() * 10) + 1;

        try {
            const response = await fetch(`https://arabic-bible.onrender.com/api?book=${randomBook}&ch=${randomChapter}&ver=${randomVer}`);
            const data = await response.json();
            if (data && data.verse) {
                currentVerse = { text: data.verse, ref: `${data.bookName} ${randomChapter}:${randomVer}` };
                vt.innerText = `"${currentVerse.text}"`;
                vr.innerText = currentVerse.ref;
            } else { throw new Error(); }
        } catch(e) {
            // آية احتياطية في حال تعطل السيرفر
            vt.innerText = "أَسْتَطِيعُ كُلَّ شَيْءٍ فِي الْمَسِيحِ الَّذِي يُقَوِّينِي.";
            vr.innerText = "فيلبي 4:13";
        }
    }

    // --- نظام التقويم مع التوقيت الذكي (الساعة 5) ---
    function displayCopticInfo() {
        let now = new Date();
        const hour = now.getHours();
        let statusText = "";

        // التوقيت الذكي: إذا تجاوزت الساعة 5 مساءً (17) يظهر تاريخ غد
        if (hour >= 17) {
            now.setDate(now.getDate() + 1);
            statusText = "<p style='color:#c9a03d; font-size:0.9rem;'>(تم تحديث التاريخ القبطي ليوم غد - بعد الساعة 5 مساءً)</p>";
        }

        const copticMonths = ["توت", "بابة", "هاتور", "كيهك", "طوبة", "أمشير", "برمهات", "برمودة", "بشنس", "بؤونة", "أبيب", "مسرى", "نسيئ"];
        const day = (now.getDate() % 30) || 30; // حساب تقريبي لليوم
        const month = copticMonths[7]; // مثال لبرمودة كما في الصورة

        document.getElementById('copticInfo').innerHTML = `
            <div class="verse-card">
                <div style="font-size:2.5rem; color:#c9a03d; margin-bottom:10px;">📅 ${day} ${month} 1742</div>
                <div style="color:#7f8c8d; margin-bottom:10px;">الموافق ميلادياً: ${now.toLocaleDateString('ar-EG')}</div>
                ${statusText}
            </div>
        `;
    }

    function saveCurrentVerse() {
        let fav = JSON.parse(localStorage.getItem('my_favs') || '[]');
        if (!fav.some(v => v.text === currentVerse.text)) {
            fav.push(currentVerse);
            localStorage.setItem('my_favs', JSON.stringify(fav));
            displayFavs();
        }
    }

    function displayFavs() {
        const fav = JSON.parse(localStorage.getItem('my_favs') || '[]');
        const container = document.getElementById('favVersesList');
        if (fav.length === 0) return;
        container.innerHTML = '<h3 style="margin-bottom:15px; color:#2c3e50;">⭐ المفضلة</h3>' + 
            fav.slice(-3).map(v => `
                <div style="background:white; padding:15px; border-radius:15px; margin-bottom:10px; border-right:3px solid #c9a03d; font-size:0.9rem;">
                    "${v.text}" <br> <small style="color:#c9a03d">${v.ref}</small>
                </div>`).join('');
    }

    function shareCurrentVerse() {
        const text = `"${currentVerse.text}"\n📖 ${currentVerse.ref}`;
        if (navigator.share) navigator.share({ title: 'آية اليوم', text: text });
        else { navigator.clipboard.writeText(text); alert("تم نسخ الآية"); }
    }

    window.onload = () => {
        loadNewVerse();
        displayCopticInfo();
        displayFavs();
        
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.content').forEach(c => c.classList.remove('active-content'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active-content');
            };
        });
    };
</script>
</body>
</html>
